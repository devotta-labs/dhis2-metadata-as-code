# Local DHIS2 stack for declare-cli projects. Not for production use.
# declare-cli start substitutes DHIS2_WEB_PORT; 8080 is the manual fallback.

services:
  web:
    image: "${DHIS2_IMAGE:-dhis2/core-dev:latest}"
    volumes:
      - ./dhis.conf:/opt/dhis2/dhis.conf:ro
      - ./log4j2.xml:/opt/dhis2/log4j2.xml:ro
    environment:
      JAVA_TOOL_OPTIONS: "-Dlog4j2.configurationFile=/opt/dhis2/log4j2.xml"
      DB_HOSTNAME: db
      DB_NAME: dhis
      DB_USERNAME: dhis
      DB_PASSWORD: dhis
    ports:
      - "127.0.0.1:${DHIS2_WEB_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: ghcr.io/baosystems/postgis:12-3.3
    environment:
      POSTGRES_USER: dhis
      POSTGRES_DB: dhis
      POSTGRES_PASSWORD: dhis
      PGPASSWORD: dhis
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - 'psql --no-password --quiet --username $$POSTGRES_USER postgres://127.0.0.1/$$POSTGRES_DB -p 5432 --command "SELECT ''ok''" > /dev/null'
      start_period: 120s
      interval: 1s
      timeout: 3s
      retries: 5

volumes:
  db-data: {}
